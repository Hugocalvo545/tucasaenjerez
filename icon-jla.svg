  <!-- Escudo exterior -->
  <path d="M100 22 L162 46 L162 112 Q162 158 100 178 Q38 158 38 112 L38 46 Z"
        fill="#1a1e2e" stroke="#C9A96E" stroke-width="4"/>
  
  <!-- Escudo interior decorativo -->
  <path d="M100 34 L150 54 L150 112 Q150 148 100 165 Q50 148 50 112 L50 54 Z"
